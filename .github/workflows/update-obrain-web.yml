name: Update obrain-web

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Obrain version (e.g. 0.5.12)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  update-obrain-web:
    name: Create obrain-web update PR
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Wait for @obrain-db/wasm to be available on npm
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Waiting for @obrain-db/wasm@${VERSION} on npm..."
          for i in $(seq 1 30); do
            if npm view "@obrain-db/wasm@${VERSION}" version 2>/dev/null; then
              echo "Package available"
              exit 0
            fi
            echo "Attempt $i/30: not yet available, waiting 30s..."
            sleep 30
          done
          echo "::error::@obrain-db/wasm@${VERSION} not found on npm after 15 minutes"
          exit 1

      - name: Wait for @obrain-db/wasm-lite to be available on npm
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Waiting for @obrain-db/wasm-lite@${VERSION} on npm..."
          for i in $(seq 1 30); do
            if npm view "@obrain-db/wasm-lite@${VERSION}" version 2>/dev/null; then
              echo "Package available"
              exit 0
            fi
            echo "Attempt $i/30: not yet available, waiting 30s..."
            sleep 30
          done
          echo "::error::@obrain-db/wasm-lite@${VERSION} not found on npm after 15 minutes"
          exit 1

      - name: Extract changelog from obrain release
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.OBRAIN_WEB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BODY=$(gh api "repos/this-rs/obrain/releases/tags/v${VERSION}" --jq '.body // empty' 2>/dev/null || echo "")
          if [ -z "$BODY" ]; then
            BODY="_Align with Obrain Core ${VERSION}_"
          fi
          # Write to file for multiline safety
          echo "$BODY" > /tmp/changelog-body.txt

      - name: Checkout obrain-web
        uses: actions/checkout@v4
        with:
          repository: this-rs/obrain-web
          token: ${{ secrets.OBRAIN_WEB_TOKEN }}
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Bump package.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version

      - name: Update @obrain-db/wasm dependency
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm install "@obrain-db/wasm@${VERSION}" --save

      - name: Update @obrain-db/wasm-lite dependency
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm install "@obrain-db/wasm-lite@${VERSION}" --save

      - name: Add changelog entry
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE="${{ steps.version.outputs.date }}"
          ENTRY="## [${VERSION}] - ${DATE}\n\n_Align with Obrain Core ${VERSION}_\n\n### Changed\n\n- **\\\`@obrain-db/wasm\\\`**: updated to ${VERSION}\n- **\\\`@obrain-db/wasm-lite\\\`**: updated to ${VERSION}\n"
          sed -i "/^All notable changes/a\\\\n${ENTRY}" CHANGELOG.md

      - name: Run typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.OBRAIN_WEB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BRANCH="auto/wasm-${VERSION}"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: update to Obrain ${VERSION}"
          git push origin "$BRANCH"

          cat > /tmp/pr-body.md <<EOF
          ## Summary

          Automated update triggered by [Obrain v${VERSION}](https://github.com/this-rs/obrain/releases/tag/v${VERSION}).

          - Bumped \`package.json\` version to ${VERSION}
          - Updated \`@obrain-db/wasm\` to ${VERSION}
          - Updated \`@obrain-db/wasm-lite\` to ${VERSION}
          - Added changelog entry
          - Typecheck and tests passed before PR creation

          ## Obrain Release Notes

          $(cat /tmp/changelog-body.txt)

          ## Checklist

          - [ ] Review changelog entry (add new API surface if applicable)
          - [ ] Verify tests pass in obrain-web CI
          - [ ] Merge when ready (release is created automatically)
          EOF

          gh pr create \
            --repo this-rs/obrain-web \
            --base main \
            --head "$BRANCH" \
            --title "Update to Obrain ${VERSION}" \
            --body-file /tmp/pr-body.md
